name: Setup Node.js environment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  setup-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '18'
          cache: npm