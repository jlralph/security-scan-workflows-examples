name: OSV-Scanner

# Change "main" to your default branch if you use a different name, i.e. "master"
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  # Required to upload SARIF file to CodeQL. See: https://github.com/github/codeql-action/issues/2117
  actions: read
  # Require writing security events to upload SARIF file to security tab
  security-events: write
  # Only need to read contents
  contents: read
  # Required to create GitHub issues
  issues: write

jobs:
  scan-pr:
    if: github.event_name == 'pull_request'
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.3"

  scan-and-create-issues:
    name: Scan & Create Issues
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install OSV Scanner
        run: |
          curl -sSfL \
            "https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64" \
            -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner

      - name: Run OSV Scanner (JSON output)
        id: scan
        continue-on-error: true
        run: |
          osv-scanner --format json --output osv-results.json -r . \
            || true  # non-zero exit when vulns found; we handle below

      - name: Ensure required labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'security',     color: 'ee0701', description: 'Security vulnerability' },
              { name: 'osv-scanner',  color: 'e4e669', description: 'Detected by OSV Scanner' },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  name:  label.name,
                });
              } catch {
                await github.rest.issues.createLabel({
                  owner:       context.repo.owner,
                  repo:        context.repo.repo,
                  name:        label.name,
                  color:       label.color,
                  description: label.description,
                });
                console.log(`Created label: ${label.name}`);
              }
            }

      - name: Sync GitHub Issues with scan results
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Parse scan results (empty results = clean scan)
            let results = { results: [] };
            if (fs.existsSync('osv-results.json')) {
              try {
                results = JSON.parse(fs.readFileSync('osv-results.json', 'utf8'));
              } catch (e) {
                core.setFailed(`Failed to parse osv-results.json: ${e.message}`);
                return;
              }
            }

            // Build the set of titles the current scan found
            const currentTitles = new Set();
            for (const result of results.results ?? []) {
              for (const pkg of result.packages ?? []) {
                for (const vuln of pkg.vulnerabilities ?? []) {
                  currentTitles.add(`[OSV] ${vuln.id}: ${pkg.package.name}@${pkg.package.version}`);
                }
              }
            }

            // Fetch all open issues filed by this workflow
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner:    context.repo.owner,
              repo:     context.repo.repo,
              labels:   'security,osv-scanner',
              state:    'open',
              per_page: 100,
            });
            const existingByTitle = new Map(existingIssues.map(i => [i.title, i]));

            let created = 0;
            let closed  = 0;
            let skipped = 0;

            // ── Close issues for vulnerabilities no longer detected ──────────
            for (const [title, issue] of existingByTitle) {
              if (!currentTitles.has(title)) {
                await github.rest.issues.createComment({
                  owner:      context.repo.owner,
                  repo:       context.repo.repo,
                  issue_number: issue.number,
                  body: '✅ This vulnerability is no longer detected by OSV Scanner. Closing automatically.',
                });
                await github.rest.issues.update({
                  owner:        context.repo.owner,
                  repo:         context.repo.repo,
                  issue_number: issue.number,
                  state:        'closed',
                });
                console.log(`Closed resolved issue #${issue.number}: ${title}`);
                closed++;
              }
            }

            // ── Open issues for newly detected vulnerabilities ───────────────
            for (const result of results.results ?? []) {
              for (const pkg of result.packages ?? []) {
                for (const vuln of pkg.vulnerabilities ?? []) {
                  const title = `[OSV] ${vuln.id}: ${pkg.package.name}@${pkg.package.version}`;

                  if (existingByTitle.has(title)) {
                    console.log(`Skipping duplicate: ${title}`);
                    skipped++;
                    continue;
                  }

                  const severity = vuln.database_specific?.severity ?? 'UNKNOWN';
                  const cvss     = vuln.severity?.find(s => s.type === 'CVSS_V3')?.score ?? 'N/A';
                  const aliases  = (vuln.aliases ?? []).join(', ') || vuln.id;
                  const cweIds   = (vuln.database_specific?.cwe_ids ?? []).join(', ') || 'N/A';
                  const refs     = (vuln.references ?? [])
                                     .map(r => `- [${r.type}](${r.url})`)
                                     .join('\n') || '_No references._';

                  const body = [
                    `## ${vuln.id}`,
                    '',
                    `| Field | Value |`,
                    `|-------|-------|`,
                    `| **Package** | \`${pkg.package.name}@${pkg.package.version}\` (${pkg.package.ecosystem}) |`,
                    `| **Severity** | ${severity} |`,
                    `| **CVSS v3 Score** | ${cvss} |`,
                    `| **Aliases** | ${aliases} |`,
                    `| **CWE** | ${cweIds} |`,
                    `| **Source file** | \`${result.source.path}\` |`,
                    '',
                    '### Summary',
                    '',
                    vuln.summary ?? '_No summary available._',
                    '',
                    '### Details',
                    '',
                    vuln.details ?? '_No details available._',
                    '',
                    '### References',
                    '',
                    refs,
                    '',
                    '---',
                    '_Detected by [OSV Scanner](https://github.com/google/osv-scanner) in CI._',
                  ].join('\n');

                  await github.rest.issues.create({
                    owner:  context.repo.owner,
                    repo:   context.repo.repo,
                    title,
                    body,
                    labels: ['security', 'osv-scanner'],
                  });

                  console.log(`Created issue: ${title}`);
                  existingByTitle.set(title, true);
                  created++;
                }
              }
            }

            console.log(`Done — ${created} opened, ${closed} closed, ${skipped} unchanged.`);
