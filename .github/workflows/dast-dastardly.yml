name: DAST Scan (Dastardly)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  dast-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Export Java 21 path
        run: echo "JAVA_HOME_21_X64=$JAVA_HOME_21_X64" >> $GITHUB_ENV

      - name: Build and start Spring Boot app
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_21_X64 }}
        run: mvn -B spring-boot:run --file pom.xml &

      - name: Wait for app to be ready
        run: |
          echo "Waiting for Spring Boot to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/actuator/health; then
              echo "App is ready."
              exit 0
            fi
            echo "Attempt $i/30 — retrying in 5s..."
            sleep 5
          done
          echo "App did not start in time." && exit 1

      - name: Run Dastardly Action Step
        continue-on-error: true
        uses: PortSwigger/dastardly-github-action@main
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_21_X64 }}
        with:
          target-url: 'http://localhost:8080'

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@v3
        with:
          report_paths: '**/dastardly-report.xml'
          require_tests: false
