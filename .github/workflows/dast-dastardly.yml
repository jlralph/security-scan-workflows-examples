name: DAST Scan (Dastardly)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  dast-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@v4

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Resolve JAVA_HOME from PATH
        run: echo "APP_JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))" >> $GITHUB_ENV

      - name: Build Spring Boot app
        env:
          JAVA_HOME: ${{ env.APP_JAVA_HOME }}
        run: mvn -B package -DskipTests --file pom.xml

      - name: Start Spring Boot app
        env:
          JAVA_HOME: ${{ env.APP_JAVA_HOME }}
        run: java -jar target/*.jar &

      - name: Wait for app to be ready
        run: |
          echo "Waiting for Spring Boot to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/actuator/health; then
              echo "App is ready."
              exit 0
            fi
            echo "Attempt $i/30 — retrying in 5s..."
            sleep 5
          done
          echo "App did not start in time." && exit 1

      - name: Run Dastardly Action Step
        continue-on-error: true
        uses: PortSwigger/dastardly-github-action@main
        env:
          JAVA_HOME: ""
        with:
          target-url: 'http://localhost:8080'

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@v3
        with:
          report_paths: '**/dastardly-report.xml'
          require_tests: false
